# CMW Platform Template Configuration
# This file defines templates and their attribute system names for the cmw_platform integration
# System names (not display names) are used for all aliases
# Attribute types are defined in code (rag_engine/cmw_platform/attribute_types.py) - they are immutable

templates:
  # Application: dima
  dima:
    # Template: TP AI Model
    TPAIModel:
      attributes:
        name:
          type: string
        title:
          type: string
        description:
          type: string
        user_question:
          type: string
        text:
          type: string
        exampletext:
          type: string

    # Template: response
    response:
      attributes:
        request:
          type: record
          reference_to: TPAIModel
        exampletext:
          type: string
