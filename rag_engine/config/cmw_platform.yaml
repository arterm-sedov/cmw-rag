# CMW Platform Configuration
# Single source of truth for the agent pipeline
# Attribute types are defined in code (rag_engine/cmw_platform/attribute_types.py) - they are immutable

# Pipeline configuration
pipeline:
  # Input: template to fetch records from
  input:
    application: dima
    template: TPAIModel
    fields:
      - name: title
      - name: question
      - name: version
      - name: browser

  # Request builder: how to combine fields into markdown
  request_template: |
    ---
    - product version: {version}
    - user browser: {browser}
    ---

    # {title}

    {question}

  # Output: template to create response in
  output:
    application: dima
    template: agent_responses
    link_field: support_request
    link_to_template: TPAIModel

# Templates: combined attribute schema + agent mapping
templates:
  dima:
    # Input template
    TPAIModel:
      attributes:
        title: string
        question: string
        version: string
        browser: string

    # Output template: schema + from_agent mapping
    agent_responses:
      attributes:
        support_request:
          type: record
          reference_to: TPAIModel
          from_agent: _input_record_id

        question_for_agent:
          type: text
          from_agent: _question_for_agent_from_md

        confidence:
          type: decimal
          from_agent: answer_confidence

        intent_confidence:
          type: decimal
          from_agent: plan.intent_confidence

        queries_count:
          type: integer
          from_agent: len(executed_queries)

        queries:
          type: text
          from_agent: executed_queries_as_html

        knowledge_base_search_queries:
          type: text
          from_agent: plan.knowledge_base_search_queries_as_html

        is_safe:
          type: boolean
          from_agent: diagnostics.guard.is_safe

        safety_categories:
          type: text
          from_agent: diagnostics.guard.categories_as_html

        user_intent:
          type: string
          from_agent: plan.user_intent

        topic:
          type: string
          from_agent: plan.topic

        category:
          type: string
          from_agent: plan.category

        spam_score:
          type: decimal
          from_agent: plan.spam_score

        spam_reason:
          type: string
          from_agent: plan.spam_reason

        action:
          type: string
          from_agent: plan.action

        action_plan:
          type: text
          from_agent: plan.action_plan_ordered_html

        safety_level:
          type: string
          from_agent: diagnostics.guard.safety_level

        sequrity_provider:
          type: string
          from_agent: diagnostics.guard.provider

        engineer_intervention_needed:
          type: boolean
          from_agent: resolution_plan.engineer_intervention_needed

        issue_summary:
          type: string
          from_agent: resolution_plan.issue_summary

        steps_completed:
          type: text
          from_agent: resolution_plan.steps_completed_ordered_html

        next_steps:
          type: text
          from_agent: resolution_plan.next_steps_ordered_html

        outcome:
          type: string
          from_agent: resolution_plan.outcome

        agent_answer:
          type: text
          from_agent: _convert_markdown_to_html_answer

        articles_count:
          type: integer
          from_agent: len(final_articles)

        articles_found:
          type: text
          from_agent: _format_articles_html
