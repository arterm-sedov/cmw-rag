  project: "Project management features and trackers"
  role_model: "Access control levels and permission logic"
  s3: "External S3 storage integration"
  scenarios: "Automation rules and event-driven logic"
  search: "Global search and record indexing"
  tables: "Data grid and table view configuration"
  tasks: "User tasks, assignments, and work queues"
  theme: "Visual styling, CSS, and branding"
  timers: "Scheduled events and background job timers"
  timezones: "Regional settings and time calculation"
