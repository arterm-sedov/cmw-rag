# Static model metadata registry for cmw-rag
# This file contains model specifications, dimensions, and provider-specific formatting rules
# Runtime configuration (which model/provider to use) goes in .env

models:
  # ============ EMBEDDING MODELS ============

  ai-forever/FRIDA:
    type: embedding
    dimensions: 1536
    description: "Russian-optimized multilingual embeddings"
    provider_formats:
      direct:
        query_prefix: "search_query: "
        doc_prefix: "search_document: "
        device: auto
        max_seq_length: 512
      infinity:
        query_prefix: "search_query: "
        doc_prefix: "search_document: "
      mosec:
        query_prefix: "search_query: "
        doc_prefix: "search_document: "
      openrouter:
        supported: false

  Qwen/Qwen3-Embedding-0.6B:
    type: embedding
    dimensions: 1024
    description: "Lightweight Qwen3 embedding model"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        model_id: "qwen/qwen3-embedding-0.6b"
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"

  Qwen/Qwen3-Embedding-4B:
    type: embedding
    dimensions: 2560
    description: "Mid-size Qwen3 embedding model"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        model_id: "qwen/qwen3-embedding-4b"
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"

  Qwen/Qwen3-Embedding-8B:
    type: embedding
    dimensions: 4096
    description: "Large Qwen3 embedding model (best quality)"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        model_id: "qwen/qwen3-embedding-8b"
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"

  # ============ RERANKER MODELS ============
  
  DiTy/cross-encoder-russian-msmarco:
    type: reranker
    dimensions: 1  # Rerankers output scores, not embeddings
    description: "Russian-optimized cross-encoder reranker"
    provider_formats:
      direct:
        batch_size: 16
        device: auto
      infinity: {}
      mosec: {}
      openrouter:
        # Not available on OpenRouter
        supported: false

  BAAI/bge-reranker-v2-m3:
    type: reranker
    dimensions: 1
    description: "Multilingual BGE reranker"
    provider_formats:
      direct:
        batch_size: 16
        device: auto
      infinity: {}
      mosec: {}
      openrouter:
        supported: false

  Qwen/Qwen3-Reranker-0.6B:
    type: reranker
    dimensions: 1
    description: "Lightweight Qwen3 reranker"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        supported: false  # Not yet available

  Qwen/Qwen3-Reranker-4B:
    type: reranker
    dimensions: 1
    description: "Mid-size Qwen3 reranker"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        supported: false

  Qwen/Qwen3-Reranker-8B:
    type: reranker
    dimensions: 1
    description: "Large Qwen3 reranker"
    provider_formats:
      direct:
        supported: false
      infinity:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      mosec:
        default_instruction: "Given a web search query, retrieve relevant passages that answer the query"
      openrouter:
        supported: false


