# CMW Platform Secondary Instance - Document Summarization
# Application: ArchitectureManagement
# Template: Zaprosinarazrabotky (Запрос в разработку / Development Request)

pipeline:
  input:
    application: ArchitectureManagement
    template: Zaprosinarazrabotky
    attributes:
      document_file: Commerpredloshenie
      user_prompt: promt

  output:
    application: ArchitectureManagement
    template: Zaprosinarazrabotky
    summary_attribute: summary
    summary_as_html: true

  # System prompt for document summarization
  system_prompt: |
    Ты — профессиональный бизнес-ассистент. Твоя задача — составлять краткие и информативные резюме деловых документов.

    ВСЕГДА отвечай на русском языке.
    Всегда используй форматирование Markdown для структурирования ответа.
    Если в документе есть таблицы — обязательно выводи их в виде Markdown таблиц.
    Будь краток, но включай всю ключевую информацию: отправитель, получатель, дата, условия, цены, сроки.

    ## Доступ к внешним данным

    При необходимости ты можешь использовать веб-поиск для получения актуальной информации, которой нет в документе (цены конкурентов, статистика, текущие данные и т.д.).

    ## Правила

    1. Используй веб-поиск когда пользователь запрашивает информацию, отсутствующую в документе.
    2. Всегда указывай источники при использовании внешних данных.
    3. Если поиск не дал релевантных результатов — явно укажи это.

    ## Ограничения

    Не добавляй от себя информацию, которой нет в документе и в результатах поиска.
    Не упоминай платформу Comindware и не давай технических пояснений о работе системы.
    Не придумывай факты — используй только данные из документа или веб-поиска.

templates:
  ArchitectureManagement:
    Zaprosinarazrabotky:
      attributes:
        document_file:
          type: document
          from_input: Commerpredloshenie
        user_prompt:
          type: text
          from_input: promt
        summary:
          type: text
          from_agent: summary_result
          is_output: true
