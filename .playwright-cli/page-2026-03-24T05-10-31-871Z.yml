                - strong [ref=e632]: Anthropic опубликовала результаты масштабного опроса пользователей Claude.
                - text: "В декабре 2025 года Anthropic провела масштабное качественное исследование: специальная версия Claude брала интервью у пользователей сервиса по всему миру. За одну неделю в нем"
                - link "приняли участие" [ref=e633] [cursor=pointer]:
                  - /url: https://www.anthropic.com/features/81k-interviews
                - text: "80 508 человек из 159 стран на 70 языках. По заявлению Anthropic, это крупнейшее и наиболее многоязычное исследование, которое когда-либо проводилось. Методика отличалась от стандартных опросов. Модель спрашивала о надеждах на ИИ, опыте его использования и страхах, а затем адаптировала follow-up вопросы на основе ответов. Классифицировать и анализировать результаты тоже помогал Claude: он кластеризовал темы, выбирал репрезентативные цитаты и оценивал преобладающие настроения."
                - generic [ref=e634]:
                  - img
                - strong [ref=e635]: Что люди хотят от ИИ
                - text: "Самый распространенный запрос - профессиональная эффективность (19%): людям нужно, чтобы ИИ взял на себя рутину, оставив им стратегические задачи. На втором месте личностный рост и эмоциональное благополучие (14%), далее - управление бытовыми задачами и когнитивная поддержка (14%)."
                - blockquote [ref=e637]: "Примечательно: когда интервьюер спрашивал, что за желанием продуктивности стоит на самом деле, многие раскрывались. Оказывалось, что дело не в работе как таковой, а в том, чтобы успевать к детям, проводить время с родителями или просто жить свою жизнь. "
                - text: "Примерно 81% участников сказали, что ИИ уже в какой-то мере оправдал их ожидания. Чаще всего называли ускорение рабочих процессов (32%), когнитивное партнерство (17%) и обучение (10%). Отдельно выделяется категория доступности: люди с нарушениями обучаемости, слуха, речи описывают ИИ как явление, которой у них раньше не было."
                - generic [ref=e638]:
                  - img
                - strong [ref=e639]: Страхи конкретнее надежд
                - text: "Главное беспокойство - ненадежность и галлюцинации (27%), следом идут угрозы занятости (22%) и потеря автономии (22%). Важный паттерн: опасения, связанные с рынком труда, сильнее всего коррелируют с общим негативным отношением к ИИ. Исследование зафиксировало 5 устойчивых противоречий, которые люди переживают одновременно, не выбирая одну из сторон:"
                - text: обучение - когнитивная деградация;
                - text: качество решений - ненадежность;
                - text: эмоциональная поддержка - зависимость;
                - text: экономия времени - ускорение темпа жизни;
                - text: экономические возможности - вытеснение с рынка труда. У пользователей, ценящих ИИ за эмоциональную поддержку, втрое выше страхя зависимости от него.
                - generic [ref=e645]:
                  - img
                - strong [ref=e646]: Региональный разрыв
                - text: "В Африке, Латинской Америке и Южной Азии смотрят на ИИ заметно оптимистичнее, чем пользователи из Северной Америки и Западной Европы. В развивающихся регионах ИИ воспринимается прежде всего как инструмент возможностей: для предпринимательства, образования, обхода инфраструктурных ограничений. В богатых странах фокус смещается на управление сложностью уже насыщенной жизни и регуляторные вопросы. Anthropic"
                - generic [ref=e647]: обещает вернуться с новыми опросами позже
