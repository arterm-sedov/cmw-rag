                - strong [ref=e701]: Anthropic выпустила Claude Code Channels.
                - text: Новая функция позволяет подключать среду Claude Code напрямую к Telegram и Discord. Взаимодействие с ИИ переходит в асинхронный формат - можно ставить задачи со смартфона и получать уведомления по факту их выполнения. В основе Channels - протокол MCP. Сообщество уже назвало релиз убийцей OpenClaw. В отличие от этого open-source фреймворка, которому для работы агента нужно выделенное устройство, Anthropic перенесла все процессы в собственную управляемую среду. Инструмент доступен в статусе превью для версий Claude Code 2.1.80 и выше. Для работы требуется подписка Pro, Max или Enterprise.
