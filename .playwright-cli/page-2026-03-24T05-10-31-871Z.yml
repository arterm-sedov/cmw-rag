                - strong [ref=e697]: Google начала закрытое тестирование Gemini для macOS.
                - text: До сих пор пользователи Mac могли обращаться к Gemini только через веб-интерфейс. Чтобы усилить конкуренцию с OpenAI и Anthropic, Google делает полноценный десктопный клиент под кодовым названием Janus. На этой неделе ранняя сборка стала доступна участникам закрытого бета-тестирования. Фишкой новинки станет Desktop Intelligence. Эта функция позволит ИИ глубоко интегрироваться с системными приложениями и считывать контекст прямо с экрана. Gemini сможет видеть активные окна и извлекать из них данные для максимально точных и персонализированных ответов, по аналогии с десктопным клиентом Claude. Сроки публичного релиза пока не известны.
                - link "bloomberg.com" [ref=e698] [cursor=pointer]:
                  - /url: https://www.bloomberg.com/news/articles/2026-03-19/google-begins-testing-gemini-mac-app-to-match-chatgpt-and-claude
                - strong [ref=e699]:
                  - generic [ref=e700]:
