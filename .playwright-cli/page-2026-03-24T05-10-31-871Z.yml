                  - text: Компания показала новую модель, способную генерировать видео в высоком разрешении в настоящем реальном времени. Ключевая фишка — time-to-first-frame менее 100 мс. Это значит, что HD-видео начинает генерироваться и воспроизводиться практически мгновенно после команды. Этот превью-ресёрч был разработан совместно с NVIDIA и работает на их новой архитектуре Vera Rubin. Такая скорость — важный шаг к созданию General World Model (GWM-1) от Runway. Технология выходит за рамки обычной генерации видео и движется в сторону живых, интерактивных сред в реальном времени.
