                - strong [ref=e704]: Adobe разрешила дообучать модели на пользовательских данных.
                - text: "В публичный бета-тест вышло обновление Adobe Firefly. Главное - функция создания кастомных ИИ-моделей: креативные команды могут дообучать модели на собственных исходниках для сохранения единого визуального стиля, внешности персонажей и специфической цветокоррекции. Обученные модели можно переиспользовать и они остаются полностью приватными. Firefly эволюционировал в ИИ-хаб. В рабочую среду интегрировано более 30 сторонних генеративных решений. Экосистема позволяет сгенерировать черновик в одной нейросети, а детализировать и редактировать результат в другой. Параллельно Adobe расширяет тестирование Project Moonlight, сквозного агентного интерфейса, который автоматизирует процессы внутри всех приложений компании с помощью текстовых команд."
