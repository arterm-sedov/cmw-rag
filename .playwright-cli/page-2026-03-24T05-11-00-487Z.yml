                - strong [ref=e1198]: Архитектурные задачи в переводе
                - text: "Ещё недавно машинный перевод был набором довольно сложных пайплайнов: модели подбирали наиболее вероятные соответствия словам и фразам и собирали перевод"
                - strong [ref=e1199]: как конструктор.
                - text: С приходом нейросетей архитектура упростилась — появилась единая модель, которая
                - strong [ref=e1200]: обрабатывает текст по предложениям
                - text: ". А с внедрением больших языковых моделей произошёл следующий сдвиг: теперь система генерирует перевод, удерживая контекст на уровне крупных блоков и выбирая формулировки в зависимости от стиля. От этого меняется и вся логика построения сервиса. Чтобы сохранить баланс скорости и точности, используется"
                - strong [ref=e1201]: гибридная архитектура
                - text: ", где лёгкие модели работают на простых задачах, а тяжёлые большие языковые модели подключаются в сложных случаях. Такой подход позволяет совмещать качество с эффективностью, и делает перевод ближе к тому, как"
                - strong [ref=e1202]: работает человек
                - text: ", но в промышленном масштабе."
