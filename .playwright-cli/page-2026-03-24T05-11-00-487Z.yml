                - strong [ref=e1048]: Elevenlabs открыл маркетплейс для продажи ИИ-музыки.
                - text: "Компания запустила платформу, где можно публиковать и монетизировать треки, созданные фирменной моделью ElevenCreative. Авторы получают отчисления, когда их композиции скачивают, ремиксуют или лицензируют другие юзеры. Предусмотрено 3 уровня лицензий: для соцсетей, платного маркетинга и офлайн-использования. По данным Elevenlabs, нейросеть уже сгенерировала почти 14 млн. песен, а схожий маркетплейс ИИ-голосов принес пользователям более $11 млн. Правовой статус треков спорный. ИИ-музыка не защищена авторским правом, так как у нее нет создателя-человека, а сама Elevenlabs не гарантирует эксклюзивность: нейросеть может выдать двум разным людям идентичный результат, и заявить права на чужой трек не выйдет. Использование в промптах имен реальных артистов или тексты существующих песен строго запрещено."
