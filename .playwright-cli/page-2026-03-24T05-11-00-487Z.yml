                - strong [ref=e1045]: В Google AI Studio добавили вайб-кодинг.
                - text: "Новая возможность позволяет описывать свои идеи естественным языком, а Gemini 3.1 Pro полностью берет на себя написание кода. Приложения собираются прямо в браузере и могут включать сложную логику: обработку платежей, мессенджеры или многопользовательские игры в реальном времени. Техническая особенность обновления - Antigravity Agent. Он понимает, когда проекту требуется база данных или система авторизации и самостоятельно разворачивает их через Firebase. Агент умеет подключать внешние сервисы по API, а при необходимости сам устанавливает нужные библиотеки компонентов. Также расширился список поддерживаемых технологий: к React и Angular теперь официально добавился фреймворк Next.js."
                - link "blog.google" [ref=e1046] [cursor=pointer]:
