                - text: "MoExperts на базе Nemotron-3-Nano-30B-A3B-Base. Отличие от первой версии - расширенный Cascade RL, где обучение с подкреплением проходит последовательно по доменам: сначала следование инструкциям, затем мультидоменное RL, потом дистилляция, RLHF, работа с длинным контекстом, код и, наконец, задачи программной инженерии."
                - generic [ref=e816]:
                  - img
                - strong [ref=e817]: Multi-Domain On-Policy Distillation (MOPD)
                - text: "На каждом этапе Cascade RL выбирается лучший промежуточный чекпоинт по конкретному домену и используется как учитель. Поскольку все учителя происходят от одной SFT-инициализации, они делят токенайзер и словарь, что упрощает дистилляцию. MOPD работает на уровне отдельных токенов, а не последовательностей, и сходится быстрее, чем классический GRPO: на AIME 2025 достигает уровня учителя за 30 шагов оптимизации."
                - generic [ref=e818]:
                  - img
                - strong [ref=e819]: Тесты
                - text: На бенчмарках модель обходит Qwen3.5-35B-A3B и более крупную Nemotron-3-Super-120B-A12B в математике, коде и следованию инструкциям.
                - text: "LiveCodeBench v6: 88.4 (у Qwen3.5 74.6);"
                - text: "ArenaHard v2: 83.5 против 65.4 у Qwen3.5;"
                - text: "IFBench: 82.9 против 70.2;"
                - text: На Codeforces модель набрала рейтинг 2345 с TIR (на уровне моделей с 300B+ параметров).
