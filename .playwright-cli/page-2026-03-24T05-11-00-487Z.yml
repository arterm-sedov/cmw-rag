                - strong [ref=e1038]: Cursor выпустила второе поколение модели Composer.
                - text: Composer 2 вступает в прямую конкуренцию с Claude Opus 4.6 и GPT-5.4, предлагая высокую производительность за меньшие деньги. Базовая стоимость использования начинается от 50 центов за млн. входных и 2,5 доллара за млн. выходных токенов. Ускоренная версия, установленная в редакторе по умолчанию, обойдется в 1,5 и 7,5 доллара соответственно. Создатели говорят, что скачок в качестве стал возможен благодаря усиленному этапу предобучения, который заложил отличную базу для последующего RL. Модель тренировали на комплексных задачах программирования, требующих от ИИ выполнения сотен самостоятельных шагов. Во внутреннем бенчмарке новинка набрала 61.3 балла, оставив далеко позади версию 1.5 с 44.2 баллами. В Terminal Bench 2.0 и SWE-bench Multilingual, Composer 2 показала результаты на уровне топовых моделей Anthropic и OpenAI. Обновление уже доступно внутри редактора Cursor.
