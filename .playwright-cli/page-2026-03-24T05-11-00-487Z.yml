                - text: "Microsoft Super Intelligence выпустило свой первый продукт - ИИ-модель для генерации картинок по тексту MAI-Image-2. В профильном рейтинге ArenaAi новинка с ходу заняла 3 место, уступая пока лишь GPT-Image-1.5 и Nano Banana 2. По заявлениям компании, модель делает особый упор на фотореализм: точно передает естественное освещение и оттенки кожи, а также уверенно справляется с детализированными сценами и неплохо рендерит текст, что критично при создании постеров, инфографики и диаграмм. Сейчас MAI-Image-2 доступна для тестов в сервисе"
                - link "MAI Playground" [ref=e1042] [cursor=pointer]:
                  - /url: https://playground.microsoft.ai/chat
                - text: ", а вскоре появится в Copilot и Bing Image Creator. Доступ по API пока открыт только узкому кругу корпоративных клиентов. Технические подробности и цены на API Microsoft пока держит в секрете."
                - link "microsoft.ai" [ref=e1043] [cursor=pointer]:
                  - /url: https://microsoft.ai/news/introducing-mai-image-2/
                - generic [ref=e1044]:
