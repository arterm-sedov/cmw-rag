                - strong [ref=e694]: OpenAI объединит ChatGPT, Codex и браузер Atlas в суперприложение.
                - text: Компания меняет стратегию, отказываясь от выпуска разрозненных продуктов. Поводом для внутренней мобилизации и объявления очередного «красного кода» стал успех Anthropic среди разработчиков и корпоративных клиентов. Особенностью супер-аппа станут агенты. Система будет работать на компьютере автономно, беря на себя написание кода, анализ данных и другие рутинные процессы. OpenAI планирует расширить функционал Codex за пределы программирования, после чего интегрирует его с ChatGPT и Atlas. Курировать перестройку продуктовой линейки поручено главе по приложениям Фиджи Симо и президенту компании Грегу Брокману.
                - link "wsj.com" [ref=e695] [cursor=pointer]:
