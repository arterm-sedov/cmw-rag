                - strong [ref=e1035]: OpenAI купила стартап Astral.
                - text: "Astral занимается созданием инструментов для Python-разработчиков. Хотя сделка еще не закрыта окончательно, ожидается, что команда стартапа вольется в подразделение, развивающее проект Codex. Технологии Astral позволят превратить Codex в комплексную платформу для разработки. Аудитория инструмента стремительно расширяется: с начала года число пользователей утроилось и перевалило за 2 млн. человек. Основатель Astral Чарли Марш подтвердил, что команда продолжит развивать свои open-source решения уже под крылом OpenAI."
