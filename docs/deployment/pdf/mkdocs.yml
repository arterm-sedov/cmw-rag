INHERIT: !ENV [MKDOCS_COMMON, ../../../.reference-repos/cbap-mkdocs-ru/mkdocs_common.yml]

use_directory_urls: false

site_name: "CMW RAG — Архитектура развёртывания"
site_description: "Техническая документация по инфраструктуре CMW RAG"
docs_dir: !ENV [MKDOCS_DOCS_DIR, ..]
site_dir: !ENV [MKDOCS_SITE_DIR, ../../../.scratch/deployment_architecture_pdf/.site]
site_url: ''

theme:
  name: material
  language: ru
  custom_dir: !ENV [MKDOCS_OVERRIDES, ../../../.reference-repos/cbap-mkdocs-ru/overrides]

extra:
  pdfOutput: true
  pdf:
    # Plain-text copyright for PDF footers (not the HTML site copyright below).
    copyright: © Comindware, 2009–2026
    frontpage:
      logo: assets/images/comindware_logo.svg
      headerRight: comindware.ru
      title: CMW RAG
      subtitle: Архитектура развёртывания
      # Only cover field from build.ps1: author + build date (MKDOCS_PDF_FOOTER_LEFT).
      footerLeft: !ENV [MKDOCS_PDF_FOOTER_LEFT, "Составил Артём Седов"]
    pageFooter:
      left: ''

copyright: '<a href="https://www.comindware.ru/" target="_blank">© 2009–2026 Comindware<sup>®</sup></a>'

nav:
  - 'CMW RAG. Архитектура развёртывания': deployment_architecture.ru.md

markdown_extensions:
  toc:
    title: На этой странице
    permalink_title: Скопируйте адрес этой ссылки, чтобы поделиться параграфом
  pymdownx.snippets:
    base_path: !ENV [MKDOCS_SNIPPETS, ../../../.reference-repos/cbap-mkdocs-ru/docs/ru/.snippets/]

plugins:
  minify:
    minify_html: false
  glightbox:
    manual: true
  with-pdf:
    cover: true
    toc_title: Оглавление
    toc_level: 3
    custom_template_path: !ENV [MKDOCS_PDF_TEMPLATES, ../../../.reference-repos/cbap-mkdocs-ru/pdf_templates]
    output_path: !ENV ['MKDOCS_PDF_OUTPUT_FILENAME', '../CMW RAG. Архитектура развёртывания.pdf']
    enabled_if_env: ''

exclude_docs: |
  *.md
  !deployment_architecture.ru.md
  pdf/**
