INHERIT: !ENV [MKDOCS_COMMON, ../../../.reference-repos/cbap-mkdocs-ru/mkdocs_common.yml]

use_directory_urls: false

site_name: "Архитектура агента обработки документов"
site_description: "Архитектура автономного ИИ-агента для обработки документов в Comindware Platform"
docs_dir: report-pack
site_dir: .site-doc-agent
site_url: ''

theme:
  name: material
  language: ru
  custom_dir: !ENV [MKDOCS_OVERRIDES, ../../../.reference-repos/cbap-mkdocs-ru/overrides]

extra:
  productName: "Архитектура агента обработки документов"
  productVersion: "Comindware Platform"
  publicationDate: "Апрель 2026"
  pdfOutput: true

copyright: '<a href="https://www.comindware.ru/" target="_blank">© 2009–2026 Comindware<sup>®</sup></a>'

nav:
  - 'Архитектура агента обработки документов': 20260420-document-agent-architecture-ru.md

markdown_extensions:
  toc:
    title: На этой странице
    permalink_title: Скопируйте адрес этой ссылки, чтобы поделиться параграфом
  pymdownx.snippets:
    base_path: !ENV [MKDOCS_SNIPPETS, ../../../.reference-repos/cbap-mkdocs-ru/docs/ru/.snippets/]
plugins:
  minify:
    minify_html: false
  glightbox:
    manual: true
  mermaid-to-svg:
    output_dir: mermaid
  with-pdf:
    cover: true
    cover_logo: assets/images/comindware_logo.svg
    cover_subtitle: "Автономный агент с глубоким поиском для Comindware Platform"
    author: comindware.ru
    toc_title: Оглавление
    toc_level: 3
    copyright: "© Comindware, 2009–2026"
    custom_template_path: !ENV [MKDOCS_PDF_TEMPLATES, ../../../.reference-repos/cbap-mkdocs-ru/pdf_templates]
    output_path: !ENV ['MKDOCS_PDF_OUTPUT_FILENAME', 'Comindware. Архитектура агента обработки документов. 2026-04.pdf']
    enabled_if_env: ''
